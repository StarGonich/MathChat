databaseChangeLog:
  - changeSet:
      id: create-table-chat
      author: ansveer
      comment: message created
      changes:
        - createTable:
            tableName: message
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: message_text
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: message_creation_date
                  type: timestamp with time zone
                  constraints:
                    nullable: false