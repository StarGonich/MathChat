databaseChangeLog:
  - changeSet:
      id: create-table-chat
      author: ansveer
      comment: chats created
      changes:
        - createTable:
            tableName: chats
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_user_id
                  type: bigint
                  constraints:
                    nullable: false
#                    foreignKeyName: fk_chats_user1
#                    references: users(id)
              - column:
                  name: second_user_id
                  type: bigint
                  constraints:
                    nullable: false
#                    foreignKeyName: fk_chats_user2
#                    references: users(id)
              - column:
                  name: last_message_id
                  type: bigint
#                  constraints:
#                    foreignKeyName: fk_chats_messages
#                    references: messages(id)
              - column:
                  name: unread_count
                  type: bigint
                  constraints:
                    nullable: false
                  defaultValue: '0'
        - addUniqueConstraint:
            tableName: chats
            columnNames: first_user_id, second_user_id
            constraintName: UC_FUserSUser