<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - User Management</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .table-hover tbody tr:hover {
            background-color: rgba(0, 0, 0, 0.075);
        }

        .status-active {
            color: #198754;
        }

        .status-blocked {
            color: #dc3545;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#" th:href="@{/admin/users}">
            User Management
        </a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Users List</h4>
        </div>

        <div class="card-body">
            <!-- Search Form -->
            <form th:action="@{/admin/users}" method="get" class="mb-4">
                <div class="input-group">
                    <input type="text"
                           name="search"
                           th:value="${search}"
                           class="form-control"
                           placeholder="Search by username, email, or name...">
                    <input type="hidden" name="page" value="0">
                    <button class="btn btn-outline-secondary" type="submit">
                        Search
                    </button>
                    <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Clear</a>
                </div>
            </form>

            <!-- Users Table -->
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.username}"></td>
                        <td>
                            <span th:text="${user.firstname + ' ' + user.lastname}"></span>
                        </td>
                        <td th:text="${user.email}"></td>
                        <td>
                                    <span th:if="${user.enabled}"
                                          class="badge bg-success">
                                        Active
                                    </span>
                            <span th:unless="${user.enabled}"
                                  class="badge bg-danger">
                                        Blocked
                                    </span>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm" role="group">
                                <form th:action="@{/api/admin/block/{id}(id=${user.id})}"
                                      method="post"
                                      th:if="${user.enabled}"
                                      style="display: inline;">
                                    <input type="hidden" name="_method" value="patch">
                                    <button type="submit"
                                            class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('Are you sure you want to block this user?')">
                                        Block
                                    </button>
                                </form>
                                <form th:action="@{/api/admin/unblock/{id}(id=${user.id})}"
                                      method="post"
                                      th:unless="${user.enabled}"
                                      style="display: inline;">
                                    <input type="hidden" name="_method" value="patch">
                                    <button type="submit"
                                            class="btn btn-outline-success btn-sm"
                                            onclick="return confirm('Are you sure you want to unblock this user?')">
                                        Unblock
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${users.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <h5>No users found</h5>
                            <p th:if="${search}" class="mb-0">
                                No results for "<span th:text="${search}"></span>"
                            </p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Пагинация -->
            <div th:if="${totalPages > 1}" class="pagination-container">
                <nav aria-label="Page navigation">
                    <ul class="pagination">
                        <!-- Первая страница -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link"
                               th:href="@{/admin/users(page=0, search=${search})}"
                               aria-label="First">
                                First
                            </a>
                        </li>

                        <!-- Предыдущая страница -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${currentPage - 1}, search=${search})}"
                               aria-label="Previous">
                                &laquo;
                            </a>
                        </li>

                        <!-- Динамический список страниц -->
                        <li th:each="pageNum : ${pageNumbers}"
                            class="page-item"
                            th:classappend="${pageNum == currentPage} ? 'active' : ''">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${pageNum}, search=${search})}"
                               th:text="${pageNum + 1}"></a>
                        </li>

                        <!-- Следующая страница -->
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${currentPage + 1}, search=${search})}"
                               aria-label="Next">
                                &raquo;
                            </a>
                        </li>

                        <!-- Последняя страница -->
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link"
                               th:href="@{/admin/users(page=${totalPages - 1}, search=${search})}"
                               aria-label="Last">
                                Last
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

            <!-- Выбор размера страницы -->
            <div class="mt-3">
                <div class="row">
                    <div class="col-md-6">
                        <div class="text-muted small">
                            Showing <span th:text="${users.size()}"></span> of
                            <span th:text="${totalItems}"></span> users
                            <span th:if="${search}"> for "<span th:text="${search}"></span>"</span>
                        </div>
                    </div>
                    <div class="col-md-6 text-end">
                        <div class="btn-group" role="group">
                            <a th:href="@{/admin/users(page=${currentPage}, search=${search})}"
                               class="btn btn-outline-secondary btn-sm disabled">
                                Page size: 20
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // JavaScript для выбора размера страницы (можно добавить позже)
    });
</script>
</body>
</html>
