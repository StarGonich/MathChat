version: '3.8'

services:
  mathchat-app:
    build: .
    container_name: mathchat-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_MINIO_ENDPOINT=http://minio:9001
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres_db:5432/MathChat
      - SPRING_DATA_REDIS_HOST=redis
    env_file:
      - .env
    depends_on:
      - minio
      - postgres_db
    networks:
      mathchat-network:

  minio:
    image: minio/minio:latest
    container_name: mathchat-minio-S3
    ports:
      - "9001:9001"
      - "9002:9002"
    command: server /data --address ":9001" --console-address ":9002"
    volumes:
      - existing-minio-data:/data
    networks:
      mathchat-network:

  grafana:
    build: './scripts/config/grafana'
    ports:
      - "3000:3000"
    volumes:
      - ./scripts/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      mathchat-network:

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./scripts/prometheus:/prometheus
    networks:
      mathchat-network:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres_db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: MathChat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      mathchat-network:
        ipv4_address: 172.18.0.4

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      mathchat-network:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      mathchat-network:

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: test@mathchat.ru
      PGADMIN_DEFAULT_PASSWORD: 12321
    ports:
      - "5050:80"
    depends_on:
      - postgres_db
    networks:
      mathchat-network:

  frontend:
    build: ../frontend
    ports:
      - "9000:9000"
    networks:
      mathchat-network:


volumes:
  existing-minio-data:
    external: true
    name: 8a6470929256df5c553a8c70d387db66276916aca1b0440f92fe3acfc9c67b57
  redis_data:
  postgres_data:

networks:
  mathchat-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1