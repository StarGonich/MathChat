version: '3.8'

services:
  mathchat-app:
    build: .
    container_name: mathchat-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_MINIO_ENDPOINT=http://minio:9001
    env_file:
      - .env
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: mathchat-minio-S3
    ports:
      - "9001:9001"
      - "9002:9002"
    command: server /data --address ":9001" --console-address ":9002"
    volumes:
      - existing-minio-data:/data

  grafana:
    build: './scripts/config/grafana'
    ports:
      - "3000:3000"
    volumes:
      - ./scripts/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./scripts/prometheus:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  existing-minio-data:
    external: true
    name: 8a6470929256df5c553a8c70d387db66276916aca1b0440f92fe3acfc9c67b57