version: '3.8'
services:
  postgres_db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 12321
      POSTGRES_DB: MathChat
    #        PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
#      - "90:90"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
#      - ../frontend/math-chat:/usr/shar/nginx/html

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
        PGADMIN_DEFAULT_EMAIL: test@mathchat.ru
        PGADMIN_DEFAULT_PASSWORD: 12321
    ports:
      - "5050:80"
    depends_on:
      - postgres_db

volumes:
  redis_data:
  postgres_data: